# §1 — Per-commit smoke. Runs on every push/PR.
#
# Drives a real session loop end-to-end on a BrowserStack-hosted real
# Pixel 8 (Android) and iPhone 15 (iOS). Asserts: connect, ≥5 frames in
# 10s, annotations correct, clean end. Hard gate — failures block the PR.

name: smoke

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-smoke:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            runner: ubuntu-latest
          # iOS: macOS runner is the only place xcodebuild can produce the
          # simulator .app artifact. The actual Appium smoke runs against
          # a real iPhone in BrowserStack — runner is just for the build.
          - platform: ios
            runner: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      # Android-only Java + SDK setup.
      - if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }
      - if: matrix.platform == 'android'
        uses: android-actions/setup-android@v3
        with: { packages: "platform-tools platforms;android-34 build-tools;34.0.0 ndk;25.1.8937393" }

      - run: npm install --no-audit --no-fund
      - run: npm run typecheck

      - name: Build harness app for ${{ matrix.platform }}
        run: ci/build-harness.sh ${{ matrix.platform }}
        env:
          SIRA_SERVER_URL: ${{ secrets.SIRA_SERVER_URL }}
          SIRA_TEST_PUBLIC_KEY: ${{ secrets.SIRA_TEST_PUBLIC_KEY }}

      # Android: real device on BrowserStack.
      - if: matrix.platform == 'android'
        name: Upload APK to BrowserStack
        id: upload
        run: ci/bs-upload.sh examples/harness/build/android/harness.apk
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}

      # iOS: simulator on this macOS runner — no signing, no BS quota.
      - if: matrix.platform == 'ios'
        name: Boot iOS simulator + start local Appium
        run: ci/run-ios-simulator.sh examples/harness/build/ios/harness.app

      - name: Run smoke session loop
        run: node ci/appium/smoke.js
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          BS_APP_URL: ${{ steps.upload.outputs.app_url }}
          PLATFORM: ${{ matrix.platform }}
          SIRA_SERVER_URL: ${{ secrets.SIRA_SERVER_URL }}
          SIRA_DASHBOARD_URL: ${{ secrets.SIRA_DASHBOARD_URL }}
          SIRA_TEST_KEY: ${{ secrets.SIRA_TEST_KEY }}
          USE_LOCAL_APPIUM: ${{ matrix.platform == 'ios' && '1' || '' }}
          LOCAL_IOS_APP_PATH: ${{ matrix.platform == 'ios' && format('{0}/examples/harness/build/ios/harness.app', github.workspace) || '' }}

      # Always upload diagnostic artifacts so we can debug iOS sim runs
      # — GH job logs are auth-only on public repos for non-collaborators
      # but actions/upload-artifact is fetchable via nightly.link.
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-artifacts-${{ matrix.platform }}
          path: ci/artifacts/
          retention-days: 7
          if-no-files-found: ignore
