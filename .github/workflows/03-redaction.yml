# §3 — Redaction verification (per-commit, hard gate).
#
# Runs the harness app through every "sensitive" screen, captures both the
# device framebuffer (ground truth) and the dashboard-received frames (what
# left the device), Tesseract-OCRs the dashboard frames, and greps for any
# of the marker strings. Any hit fails the build.
#
# Sensitive screens and marker strings live in ci/redaction-targets.yaml so
# integrators can extend without touching CI code.

name: redaction

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  redaction:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix:
        include:
          # Android: Linux runner builds the APK with gradle (free on
          # public repos).
          - platform: android
            runner: ubuntu-latest
          # iOS: macOS runner is the only place xcodebuild can produce a
          # .app — Apple licensing means there's no Linux alternative.
          # ~$0.16/min on private repos; free on public.
          - platform: ios
            runner: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      # Android-only toolchain
      - if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }
      - if: matrix.platform == 'android'
        uses: android-actions/setup-android@v3
        with: { packages: "platform-tools platforms;android-34 build-tools;34.0.0 ndk;25.1.8937393" }

      # OCR (host-side; same on both runners). brew on macOS, apt on linux.
      - if: matrix.platform == 'android'
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr
      - if: matrix.platform == 'ios'
        run: brew install tesseract

      - run: npm install --no-audit --no-fund

      - name: Build harness with redaction-test fixtures
        run: REDACTION_FIXTURES=1 ci/build-harness.sh ${{ matrix.platform }}
        env:
          SIRA_SERVER_URL: ${{ secrets.SIRA_SERVER_URL }}
          # Bake signaling diag into the bundle (see 01-smoke.yml).
          EXPO_PUBLIC_SIRA_DEBUG: "1"

      # ─── Android: real device on BrowserStack ─────────────────────────
      - if: matrix.platform == 'android'
        name: Upload APK to BrowserStack
        id: upload
        run: ci/bs-upload.sh examples/harness/build/android/harness.apk
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}

      # ─── iOS: simulator on this same macOS runner (no signing) ────────
      - if: matrix.platform == 'ios'
        name: Boot iOS simulator + start local Appium
        run: ci/run-ios-simulator.sh examples/harness/build/ios/harness.app

      - name: Capture and OCR
        # See note in smoke.yml — capture stdout for post-mortem.
        run: |
          mkdir -p ci/artifacts
          set -o pipefail
          node ci/appium/redaction.js 2>&1 | tee ci/artifacts/redaction-stdout.log
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          BS_APP_URL: ${{ steps.upload.outputs.app_url }}
          PLATFORM: ${{ matrix.platform }}
          OUT_DIR: redaction-frames
          SIRA_SERVER_URL: ${{ secrets.SIRA_SERVER_URL }}
          SIRA_TEST_KEY: ${{ secrets.SIRA_TEST_KEY }}
          USE_LOCAL_APPIUM: ${{ matrix.platform == 'ios' && '1' || '' }}
          LOCAL_IOS_APP_PATH: ${{ matrix.platform == 'ios' && format('{0}/examples/harness/build/ios/harness.app', github.workspace) || '' }}

      - name: Assert no marker strings leaked
        run: node ci/assert-redaction.js redaction-frames ci/redaction-targets.yaml

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: redaction-frames-${{ matrix.platform }}
          path: |
            redaction-frames/
            ci/artifacts/
          retention-days: 7
